<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shorten It</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #4c1d95, #be123c);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
    }

    .container {
      width: 100%;
      max-width: 880px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(44px, 7vw, 72px);
      margin: 0;
      letter-spacing: -3px;
    }

    .card {
      background: rgba(15, 23, 42, 0.8);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.4);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      margin-bottom: 16px;
    }

    input[type="datetime-local"] {
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #a855f7, #ef4444);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .result {
      display: none;
      margin-top: 20px;
    }

    .analytics {
      display: none;
      margin-top: 20px;
    }

    .visit {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="hero">
      <h1>Shorten It</h1>
    </div>

    <div class="card">
      <label>Long URL</label>
      <input id="targetUrl" placeholder="https://example.com" />

      <label>Expiration Optional, Max 7 Days</label>
      <input id="expiresAt" type="datetime-local" />

      <button onclick="shortenUrl()">Create Short Link</button>

      <div id="result" class="result">
        <p><strong>Short URL:</strong></p>
        <a id="shortUrl" target="_blank"></a>

        <button onclick="loadAnalytics()">View Analytics</button>
      </div>

      <div id="analytics" class="analytics">
        <p><strong>Clicks:</strong> <span id="clickCount"></span></p>

        <canvas id="chart"></canvas>

        <h3>Visits</h3>
        <div id="visits"></div>
      </div>
    </div>
  </div>

  <script>
    let currentAdminUrl = "";
    let chart = null;

    function setMinDate() {
      const input = document.getElementById("expiresAt");

      const now = new Date();
      now.setSeconds(0, 0);

      const oneWeekFromNow = new Date(now);
      oneWeekFromNow.setDate(oneWeekFromNow.getDate() + 7);

      input.min = new Date(now - now.getTimezoneOffset() * 60000)
        .toISOString()
        .slice(0, 16);

      input.max = new Date(oneWeekFromNow - oneWeekFromNow.getTimezoneOffset() * 60000)
        .toISOString()
        .slice(0, 16);
    }

    function openExpirationPicker() {
      const expiresInput = document.getElementById("expiresAt");

      expiresInput.addEventListener("focus", () => {
        if (expiresInput.showPicker) {
          expiresInput.showPicker();
        }
      });

      expiresInput.addEventListener("click", () => {
        if (expiresInput.showPicker) {
          expiresInput.showPicker();
        }
      });
    }

    async function shortenUrl() {
      const url = document.getElementById("targetUrl").value;
      const exp = document.getElementById("expiresAt").value;

      const body = {
        target_url: url,
        expires_at: exp ? new Date(exp).toISOString() : null
      };

      const res = await fetch("/url", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
      });

      const data = await res.json();

      currentAdminUrl = data.admin_url;

      document.getElementById("shortUrl").textContent = data.url;
      document.getElementById("shortUrl").href = data.url;

      document.getElementById("result").style.display = "block";
    }

    async function loadAnalytics() {
      const res = await fetch(currentAdminUrl);
      const data = await res.json();

      document.getElementById("clickCount").textContent = data.clicks;

      const visitsDiv = document.getElementById("visits");
      visitsDiv.innerHTML = "";

      const counts = {};

      data.visits.forEach(v => {
        const date = new Date(v.visited_at).toLocaleDateString();
        counts[date] = (counts[date] || 0) + 1;

        const el = document.createElement("div");
        el.className = "visit";
        el.innerHTML = `
          ${new Date(v.visited_at).toLocaleString()}<br>
          Country: ${v.country || "Unknown"}
        `;
        visitsDiv.appendChild(el);
      });

      renderChart(counts);

      document.getElementById("analytics").style.display = "block";
    }

    function renderChart(counts) {
      const labels = Object.keys(counts);
      const values = Object.values(counts);

      const ctx = document.getElementById("chart");

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label: "Clicks",
            data: values,
            fill: true,
            tension: 0.3
          }]
        }
      });
    }

    setMinDate();
    openExpirationPicker();
  </script>
</body>
</html>
